name: Artifacts MMOG CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: artifacts-mmog-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Artifacts MMOG CI
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.17"
          otp-version: "27"

      - name: Cache Mix deps
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-artifacts-mmog-mix-${{ hashFiles('mix.lock') }}
          restore-keys: ${{ runner.os }}-artifacts-mmog-mix-

      - name: Install dependencies
        run: mix deps.get

      - name: Compile (builds taskweft C++ NIF)
        run: mix compile --warnings-as-errors

      - name: Check formatting
        run: mix format --check-formatted

      - name: Run tests
        run: mix test --trace
